services:
  - type: web
    name: jdm-cash
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jdm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: jdm-db
    databaseName: jdm_cash
    user: jdm_user
