services:
  - type: web
    name: jdm-cash
    env: python
    buildCommand: pip install -r requirements.txt
    # Render inyecta PORT; hay que enlazar 0.0.0.0 o el healthcheck falla y mata el proceso.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 60 --access-logfile - --error-logfile -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jdm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: jdm-db
    databaseName: jdm_cash
    user: jdm_user
